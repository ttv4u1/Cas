<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PowerFlow v5.1.0 Platinum Elite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg-color: #05080f;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-dim: #64748b;
            --green: #10b981;
        }

        .light-mode {
            --bg-color: #f8fafc;
            --glass: rgba(255, 255, 255, 0.7);
            --border: rgba(0, 0, 0, 0.05);
            --text: #0f172a;
            --text-dim: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* No Scroll */
            transition: background 0.5s ease;
        }

        /* Ambient Background */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--primary), transparent 70%);
            filter: blur(80px);
            opacity: 0.15;
            z-index: -1;
        }

        /* Compact Dashboard */
        .dashboard {
            width: 95%;
            max-width: 900px;
            height: 90vh;
            max-height: 600px;
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 25px;
            display: grid;
            grid-template-columns: 0.8fr 1.2fr;
            gap: 20px;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* USB Lock Screen */
        #usb-lock {
            position: absolute;
            inset: 0;
            background: var(--bg-color);
            z-index: 1000;
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: 0.6s ease-in-out;
            border: 1px solid var(--border);
        }

        .usb-anim {
            font-size: 60px;
            margin-bottom: 15px;
            color: var(--primary);
            animation: pulse 2s infinite;
        }

        /* Battery Visual (Left) */
        .visual-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 20px;
        }

        .battery-shell {
            width: 100px;
            height: 180px;
            border: 4px solid var(--text);
            border-radius: 20px;
            position: relative;
            padding: 4px;
        }

        .battery-shell::after {
            content: '';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 40%;
            height: 8px;
            background: var(--text);
            border-radius: 4px 4px 0 0;
        }

        .liquid-container {
            width: 100%;
            height: 100%;
            border-radius: 14px;
            overflow: hidden;
            position: relative;
            background: rgba(255,255,255,0.05);
        }

        .liquid {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0%;
            background: linear-gradient(to top, var(--secondary), var(--primary));
            transition: height 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 30px var(--primary);
        }

        /* Double Wave SVG Animation */
        .wave {
            position: absolute;
            top: -10px;
            width: 200%;
            height: 20px;
            fill: var(--primary);
            animation: moveWave 3s linear infinite;
        }
        .wave-back {
            top: -12px;
            fill: var(--secondary);
            opacity: 0.5;
            animation: moveWave 2s linear infinite;
        }

        @keyframes moveWave {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Stats Grid (Right) */
        .stats-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .version-tag {
            font-size: 10px;
            background: var(--primary);
            color: #000;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 900;
        }

        .grid-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            flex-grow: 1;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card i {
            width: 35px;
            height: 35px;
            background: rgba(0,242,254,0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 14px;
        }

        .card-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }
        .card-value { font-size: 15px; font-weight: 700; }

        .wide { grid-column: span 2; border: 1px solid rgba(16, 185, 129, 0.3); }

        /* Controls */
        .theme-toggle {
            cursor: pointer;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--glass);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Responsive Fix */
        @media (max-width: 700px) {
            .dashboard {
                grid-template-columns: 1fr;
                height: 95vh;
                max-height: none;
                gap: 10px;
                padding: 15px;
            }
            .visual-box { padding: 10px; height: 220px; }
            .battery-shell { width: 80px; height: 140px; }
            .grid-stats { grid-template-columns: 1fr 1fr; }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.6; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="bg-glow" style="top: 10%; left: 10%;"></div>
    <div class="bg-glow" style="bottom: 10%; right: 10%;"></div>

    <div class="dashboard" id="main-dash">
        <!-- Locked State -->
        <div id="usb-lock">
            <i class="fab fa-usb usb-anim"></i>
            <h3 style="letter-spacing: 2px;">V5.1.0 ENCRYPTED</h3>
            <p style="color: var(--text-dim); font-size: 12px; margin-top: 5px;">Plug in USB Cable to Unlock Pro Dashboard</p>
        </div>

        <!-- Left Column -->
        <div class="visual-box">
            <div class="battery-shell">
                <div class="liquid-container">
                    <div class="liquid" id="liq-fill">
                        <svg class="wave wave-back" viewBox="0 0 120 28"><path d="M0 15Q30 0 60 15t60 0v13H0z"/></svg>
                        <svg class="wave" viewBox="0 0 120 28"><path d="M0 15Q30 0 60 15t60 0v13H0z"/></svg>
                    </div>
                </div>
            </div>
            <h1 id="perc-num" style="font-size: 40px; margin-top: 10px;">0%</h1>
            <div id="charge-status" style="font-size: 11px; font-weight: 800; color: var(--green); letter-spacing: 1px;">
                <i class="fas fa-bolt"></i> FAST CHARGING
            </div>
        </div>

        <!-- Right Column -->
        <div class="stats-box">
            <div class="header-info">
                <div>
                    <h2 style="font-size: 18px;">PowerFlow Pro</h2>
                    <span class="version-tag">V5.1.0 PLATINUM</span>
                </div>
                <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
            </div>

            <div class="grid-stats">
                <div class="card">
                    <i class="fas fa-clock"></i>
                    <div>
                        <div class="card-label">Until 100%</div>
                        <div class="card-value" id="eta">Calibrating...</div>
                    </div>
                </div>
                <div class="card">
                    <i class="fas fa-bolt"></i>
                    <div>
                        <div class="card-label">Voltage</div>
                        <div class="card-value" id="volt">4.20 V</div>
                    </div>
                </div>
                <div class="card">
                    <i class="fas fa-fire"></i>
                    <div>
                        <div class="card-label">Thermal</div>
                        <div class="card-value" id="temp">32.4 °C</div>
                    </div>
                </div>
                <div class="card">
                    <i class="fas fa-wave-square"></i>
                    <div>
                        <div class="card-label">Arus (Amp)</div>
                        <div class="card-value" id="amp">2400 mA</div>
                    </div>
                </div>
                <div class="card">
                    <i class="fas fa-shield-heart"></i>
                    <div>
                        <div class="card-label">Health</div>
                        <div class="card-value" style="color: var(--green);">Optimal</div>
                    </div>
                </div>
                <div class="card">
                    <i class="fas fa-sync"></i>
                    <div>
                        <div class="card-label">Cycles</div>
                        <div class="card-value">128</div>
                    </div>
                </div>
                <div class="card wide">
                    <i class="fas fa-microchip"></i>
                    <div style="width: 100%;">
                        <div class="card-label">AI Optimization Active</div>
                        <div class="card-value" style="font-size: 11px;">Maintaining Peak Performance & Lifespan</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const lock = document.getElementById('usb-lock');
        const fill = document.getElementById('liq-fill');
        const perc = document.getElementById('perc-num');
        const etaText = document.getElementById('eta');
        const voltText = document.getElementById('volt');
        const tempText = document.getElementById('temp');
        const ampText = document.getElementById('amp');

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
        }

        async function monitorBattery() {
            if (!navigator.getBattery) return;

            const battery = await navigator.getBattery();

            function updateUI() {
                const level = (battery.level * 100).toFixed(0);
                
                // USB Lock Logic
                if (battery.charging) {
                    lock.style.opacity = "0";
                    lock.style.pointerEvents = "none";
                } else {
                    lock.style.opacity = "1";
                    lock.style.pointerEvents = "all";
                }

                // Battery Fill
                fill.style.height = level + '%';
                perc.innerText = level + '%';

                // Real-time ETA Logic
                if (battery.charging) {
                    if (battery.chargingTime !== Infinity) {
                        etaText.innerText = Math.floor(battery.chargingTime / 60) + " Mins";
                    } else {
                        // Formula: (100 - current) * 1.5 mins per %
                        let remain = 100 - level;
                        etaText.innerText = "~" + Math.round(remain * 1.5) + " Mins";
                    }
                } else {
                    etaText.innerText = "Connect USB";
                }

                // Simulate Pro Sensor Data
                simulateSensors(battery.level);
            }

            function simulateSensors(lvl) {
                // Voltage: 3.6V to 4.4V
                voltText.innerText = (3.6 + (lvl * 0.8)).toFixed(2) + " V";
                // Temperature fluctuating
                tempText.innerText = (31 + Math.random() * 3).toFixed(1) + " °C";
                // Ampere: Fast charge drops as it gets full
                let mA = Math.floor(3500 - (lvl * 2500));
                ampText.innerText = mA + " mA";
            }

            updateUI();
            battery.addEventListener('chargingchange', updateUI);
            battery.addEventListener('levelchange', updateUI);
            battery.addEventListener('chargingtimechange', updateUI);
        }

        monitorBattery();

        // Reveal Animation on Tilt
        document.addEventListener('mousemove', (e) => {
            if(window.innerWidth > 800) {
                const dash = document.getElementById('main-dash');
                const x = (window.innerWidth / 2 - e.pageX) / 60;
                const y = (window.innerHeight / 2 - e.pageY) / 60;
                dash.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
            }
        });
    </script>
</body>
</html>
