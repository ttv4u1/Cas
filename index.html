<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POWER CORE PRO | Autonomous Charge System</title>
    <!-- Google Fonts for Sci-Fi look -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glow-cyan: #00f3ff;
            --glow-magenta: #ff00ff;
            --bg-ultra-dark: #02050a;
            --panel-bg: rgba(8, 15, 25, 0.9);
            --text-main: #e0faff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-ultra-dark);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Ambient Background */
        .cyber-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 50% 50%, rgba(0, 243, 255, 0.05) 0%, transparent 70%),
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 100%, 100% 4px, 3px 100%;
            z-index: -1;
        }

        /* Main HUD Container */
        .hud-container {
            width: 95%;
            max-width: 450px;
            padding: 25px;
            position: relative;
            background: var(--panel-bg);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 40px;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 243, 255, 0.05);
            opacity: 0;
            transform: translateY(30px) scale(0.95);
            transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .hud-container.reveal {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* Header Details */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .system-id {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            color: var(--glow-cyan);
            letter-spacing: 2px;
        }

        .live-tag {
            background: rgba(255, 0, 0, 0.2);
            color: #ff4d4d;
            padding: 2px 8px;
            font-size: 0.6rem;
            border-radius: 4px;
            border: 1px solid #ff4d4d;
            animation: pulse 1s infinite alternate;
        }

        /* Realistic Battery Visualization */
        .battery-wrapper {
            position: relative;
            width: 140px;
            height: 240px;
            margin: 0 auto 40px;
        }

        .battery-core {
            width: 100%;
            height: 100%;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            position: relative;
            padding: 8px;
            background: rgba(0, 0, 0, 0.4);
        }

        .battery-core::before {
            content: '';
            position: absolute;
            top: -15px; left: 50%;
            transform: translateX(-50%);
            width: 50px; height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px 6px 0 0;
        }

        .liquid-fill {
            width: 100%;
            height: 0%;
            background: linear-gradient(180deg, var(--glow-cyan) 0%, #005f6b 100%);
            border-radius: 18px;
            position: absolute;
            bottom: 8px;
            left: 8px;
            right: 8px;
            width: calc(100% - 16px);
            transition: height 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.4);
            overflow: hidden;
        }

        /* Charging Bubbles Animation */
        .bubbles {
            position: absolute;
            width: 100%;
            height: 100%;
            bottom: 0;
            display: none;
        }

        .is-charging .bubbles {
            display: block;
        }

        .bubble {
            position: absolute;
            bottom: -20px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            animation: bubbleUp 3s infinite;
        }

        @keyframes bubbleUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-200px) scale(0.5); opacity: 0; }
        }

        .percentage-display {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
        }

        .percentage-display h2 {
            font-size: 3.5rem;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            color: white;
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.8);
        }

        /* Data Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
        }

        .stat-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--glow-cyan);
        }

        .stat-label {
            font-size: 0.65rem;
            color: #888;
            text-transform: uppercase;
            display: block;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--glow-cyan);
        }

        /* USB Connection Status */
        .usb-badge {
            margin-top: 25px;
            padding: 10px;
            border-radius: 10px;
            font-size: 0.8rem;
            text-align: center;
            border: 1px dashed rgba(0, 243, 255, 0.3);
            transition: all 0.5s;
        }

        .usb-badge.active {
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid var(--glow-cyan);
            color: var(--glow-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }

        /* Animations */
        @keyframes pulse {
            0% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .charge-glitch {
            animation: glitch 0.2s 3;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-5px, 5px); }
            40% { transform: translate(-5px, -5px); }
            60% { transform: translate(5px, 5px); }
            80% { transform: translate(5px, -5px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>

    <div class="cyber-bg"></div>

    <div class="hud-container" id="hud">
        <div class="header">
            <div class="system-id">CORE_v3.0.4 // <span id="os-detect">SMARTPHONE</span></div>
            <div class="live-tag">REALTIME</div>
        </div>

        <div class="battery-wrapper" id="batteryWrapper">
            <div class="percentage-display">
                <h2 id="perc-val">--%</h2>
                <span id="charge-status" style="font-size: 0.7rem; letter-spacing: 2px;">SCANNING</span>
            </div>
            <div class="battery-core">
                <div class="liquid-fill" id="fill-level">
                    <div class="bubbles" id="bubbles-container"></div>
                </div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">Estimated Time</span>
                <span class="stat-value" id="time-val">Calculating...</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Power Protocol</span>
                <span class="stat-value" id="protocol-val">USB-PD 3.0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Health Monitoring</span>
                <span class="stat-value" style="color: #00ff88;">EXCELLENT</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">System Temp</span>
                <span class="stat-value" id="temp-val">28.4°C</span>
            </div>
        </div>

        <div class="usb-badge" id="usb-badge">
            WAITING FOR USB-C / LIGHTNING...
        </div>
    </div>

    <script>
        const hud = document.getElementById('hud');
        const fillLevel = document.getElementById('fill-level');
        const percVal = document.getElementById('perc-val');
        const chargeStatus = document.getElementById('charge-status');
        const usbBadge = document.getElementById('usb-badge');
        const timeVal = document.getElementById('time-val');
        const osDetect = document.getElementById('os-detect');
        const batteryWrapper = document.getElementById('batteryWrapper');
        const bubblesContainer = document.getElementById('bubbles-container');

        // Reveal HUD
        window.addEventListener('load', () => {
            setTimeout(() => {
                hud.classList.add('reveal');
                detectOS();
                initBattery();
                createBubbles();
            }, 500);
        });

        function detectOS() {
            const ua = navigator.userAgent;
            if (/iPhone|iPad|iPod/i.test(ua)) osDetect.innerText = "APPLE DEVICE";
            else if (/Android/i.test(ua)) osDetect.innerText = "ANDROID SYSTEM";
            else osDetect.innerText = "WEB INTERFACE";
        }

        function createBubbles() {
            for (let i = 0; i < 15; i++) {
                let b = document.createElement('div');
                b.className = 'bubble';
                b.style.left = Math.random() * 100 + '%';
                b.style.width = b.style.height = Math.random() * 8 + 4 + 'px';
                b.style.animationDelay = Math.random() * 3 + 's';
                bubblesContainer.appendChild(b);
            }
        }

        async function initBattery() {
            try {
                if ('getBattery' in navigator) {
                    const battery = await navigator.getBattery();
                    
                    const updateBatteryData = () => {
                        const level = Math.round(battery.level * 100);
                        fillLevel.style.height = level + '%';
                        percVal.innerText = level + '%';

                        if (battery.charging) {
                            handleConnect();
                            if (battery.chargingTime !== Infinity) {
                                const m = Math.floor(battery.chargingTime / 60);
                                timeVal.innerText = m + " MIN TO FULL";
                            } else {
                                timeVal.innerText = "FAST CHARGING";
                            }
                        } else {
                            handleDisconnect();
                            timeVal.innerText = "NOT CHARGING";
                        }
                    };

                    updateBatteryData();
                    battery.addEventListener('chargingchange', updateBatteryData);
                    battery.addEventListener('levelchange', updateBatteryData);
                } else {
                    // Manual Fallback for iOS
                    simulateForIOS();
                }
            } catch (e) {
                simulateForIOS();
            }
        }

        function handleConnect() {
            chargeStatus.innerText = "CHARGING ACTIVE";
            usbBadge.innerText = "USB CONNECTION DETECTED";
            usbBadge.classList.add('active');
            batteryWrapper.classList.add('is-charging');
            hud.classList.add('charge-glitch');
            setTimeout(() => hud.classList.remove('charge-glitch'), 500);
        }

        function handleDisconnect() {
            chargeStatus.innerText = "DISCHARGING";
            usbBadge.innerText = "WAITING FOR USB-C / LIGHTNING...";
            usbBadge.classList.remove('active');
            batteryWrapper.classList.remove('is-charging');
        }

        function simulateForIOS() {
            // Karena Safari iOS memblokir API Baterai untuk privasi, 
            // kita gunakan UI State yang tetap fungsional dan estetis.
            percVal.innerText = "80%";
            fillLevel.style.height = "80%";
            chargeStatus.innerText = "PRO MODE ACTIVE";
            timeVal.innerText = "API RESTRICTED";
            
            // Memberikan efek interaktif jika user menyentuh layar (simulasi plug-in)
            document.body.addEventListener('touchstart', () => {
                handleConnect();
                setTimeout(handleDisconnect, 3000);
            });
        }

        // Random Temp Simulator
        setInterval(() => {
            const temp = (28 + Math.random() * 2).toFixed(1);
            document.getElementById('temp-val').innerText = temp + "°C";
        }, 4000);

    </script>
</body>
</html>
