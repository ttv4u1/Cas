<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BATT-PRO v8.0.0 | Nexus Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@600;900&display=swap');

        :root { --cyan: #00f7ff; --dark: #020617; }
        body {
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden; /* One page only */
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Top Charging Bar */
        #charge-bar-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 6px;
            background: rgba(255,255,255,0.05); z-index: 10001;
        }
        #charge-bar-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, transparent, var(--cyan), #fff, var(--cyan), transparent);
            background-size: 200% 100%;
            box-shadow: 0 0 15px var(--cyan);
            transition: width 0.5s ease;
        }
        .charging-active { animation: flow 2s linear infinite; }
        @keyframes flow { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Glass Design */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass:hover { background: rgba(255, 255, 255, 0.08); transform: translateY(-2px); border-color: var(--cyan); }

        /* Reveal Animation */
        .reveal { opacity: 0; transform: translateY(10px); animation: fadeInUp 0.6s forwards; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        /* Modal Overlay */
        #modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10002;
            display: none; align-items: center; justify-content: center; padding: 20px;
        }

        #lock-screen {
            position: fixed; inset: 0; background: var(--dark); z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        body.unlocked #lock-screen { display: none; }
    </style>
</head>
<body class="p-3 md:p-6 flex flex-col">

    <!-- TOP CHARGING BAR -->
    <div id="charge-bar-container">
        <div id="charge-bar-fill"></div>
    </div>

    <!-- LOCK SCREEN -->
    <div id="lock-screen" class="text-center">
        <i class="fas fa-bolt-lightning text-6xl text-cyan-400 mb-6 animate-pulse"></i>
        <h1 class="orbitron text-xl font-bold mb-8">BATT-PRO <span class="text-cyan-400">NEXUS v8</span></h1>
        <button onclick="unlock()" class="px-8 py-3 glass text-[10px] font-bold tracking-widest text-cyan-400">INITIALIZE DASHBOARD</button>
    </div>

    <!-- MAIN INTERFACE -->
    <div class="flex-grow flex flex-col max-w-5xl mx-auto w-full">
        
        <!-- Header -->
        <header class="flex justify-between items-center mb-4 reveal">
            <h1 class="orbitron text-lg font-black tracking-tighter">NEXUS <span class="text-cyan-400">v8.0.0</span></h1>
            <div id="os-tag" class="text-[9px] mono bg-cyan-500/10 text-cyan-400 px-2 py-1 rounded border border-cyan-500/20">SYSTEM: READY</div>
        </header>

        <!-- Main Gauge (Compact) -->
        <div class="glass flex-grow mb-4 flex flex-col items-center justify-center relative overflow-hidden reveal" style="animation-delay: 0.1s">
            <div class="relative">
                <svg class="w-48 h-48 md:w-56 md:h-56 transform -rotate-90">
                    <circle cx="50%" cy="50%" r="45%" stroke="rgba(255,255,255,0.05)" stroke-width="4" fill="transparent" />
                    <circle id="ring" cx="50%" cy="50%" r="45%" stroke="var(--cyan)" stroke-width="8" fill="transparent" 
                        stroke-dasharray="600" stroke-dashoffset="600" stroke-linecap="round"
                        class="transition-all duration-1000 ease-out" style="filter: drop-shadow(0 0 8px var(--cyan))" />
                </svg>
                <div class="absolute inset-0 flex flex-col justify-center items-center">
                    <span id="perc" class="text-5xl md:text-6xl font-black orbitron">0%</span>
                    <span id="status-label" class="text-[8px] font-bold text-cyan-500 tracking-[0.3em] uppercase">STANDBY</span>
                </div>
            </div>
        </div>

        <!-- Stats Grid (Clickable) -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4 reveal" style="animation-delay: 0.2s">
            <div class="glass p-4" onclick="showDetail('power')">
                <p class="text-[9px] text-gray-500 font-bold uppercase mb-1">Power</p>
                <p class="text-xl font-bold orbitron text-cyan-400"><span id="watt">0.0</span><span class="text-[10px] ml-1">W</span></p>
            </div>
            <div class="glass p-4" onclick="showDetail('temp')">
                <p class="text-[9px] text-gray-500 font-bold uppercase mb-1">Temp</p>
                <p class="text-xl font-bold orbitron text-orange-400"><span id="temp">0.0</span><span class="text-[10px] ml-1">°C</span></p>
            </div>
            <div class="glass p-4" onclick="showDetail('health')">
                <p class="text-[9px] text-gray-500 font-bold uppercase mb-1">Health</p>
                <p class="text-xl font-bold orbitron text-green-400">98<span class="text-[10px] ml-1">%</span></p>
            </div>
            <div class="glass p-4" onclick="showDetail('eta')">
                <p class="text-[9px] text-gray-500 font-bold uppercase mb-1">ETA</p>
                <p id="eta" class="text-xl font-bold orbitron text-white">--:--</p>
            </div>
        </div>

        <!-- Analytics Quick View -->
        <div class="glass p-4 h-32 md:h-40 reveal" style="animation-delay: 0.3s" onclick="showDetail('curve')">
            <div class="flex justify-between items-center mb-2">
                <h3 class="text-[9px] font-bold text-gray-500 uppercase">Live Analytic Curve</h3>
                <span class="text-[8px] text-cyan-500 animate-pulse">LIVE SYNC</span>
            </div>
            <canvas id="miniChart"></canvas>
        </div>

        <footer class="mt-4 text-center reveal" style="animation-delay: 0.4s">
            <p class="text-[8px] mono text-gray-600 tracking-[0.5em]">BATT-PRO NEXUS // PRO EDITION v8.0.0</p>
        </footer>
    </div>

    <!-- INTERACTIVE MODAL -->
    <div id="modal" onclick="closeModal()">
        <div class="glass p-8 w-full max-w-md relative" onclick="event.stopPropagation()">
            <button class="absolute top-4 right-4 text-gray-500" onclick="closeModal()"><i class="fas fa-times"></i></button>
            <div id="modal-content">
                <!-- Content injected by JS -->
            </div>
        </div>
    </div>

    <script>
        let chart;
        const telemetry = { level: [], labels: [], temp: [] };

        function initChart() {
            const ctx = document.getElementById('miniChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: telemetry.labels,
                    datasets: [{
                        data: telemetry.level,
                        borderColor: '#00f7ff',
                        borderWidth: 2,
                        fill: true,
                        backgroundColor: 'rgba(0, 247, 255, 0.05)',
                        tension: 0.4,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { display: false, min:0, max:100 }, x: { display: false } }
                }
            });
        }

        async function startEngine() {
            if (!('getBattery' in navigator)) return;
            const battery = await navigator.getBattery();

            function update() {
                const lvl = battery.level * 100;
                const char = battery.charging;

                // Sync UI
                document.getElementById('perc').innerText = Math.floor(lvl) + "%";
                document.getElementById('ring').style.strokeDashoffset = 600 - (600 * lvl / 100);
                document.getElementById('status-label').innerText = char ? "Charging" : "Discharging";
                
                // Top Bar
                const barFill = document.getElementById('charge-bar-fill');
                barFill.style.width = lvl + "%";
                if(char) {
                    barFill.classList.add('charging-active');
                    document.body.classList.add('unlocked');
                } else {
                    barFill.classList.remove('charging-active');
                    document.body.classList.remove('unlocked');
                }

                // ETA
                if (char && battery.chargingTime !== Infinity) {
                    const m = Math.floor(battery.chargingTime / 60);
                    document.getElementById('eta').innerText = m + "m";
                } else if (char) {
                    document.getElementById('eta').innerText = `~${Math.floor((100-lvl)*1.5)}m`;
                }

                // Mock Stats
                const mockW = char ? (lvl < 80 ? 18.2 : 5.4).toFixed(1) : "0.0";
                const mockT = (29 + (lvl/12) + (char?2:0)).toFixed(1);
                document.getElementById('watt').innerText = mockW;
                document.getElementById('temp').innerText = mockT;

                // Chart
                telemetry.labels.push("");
                telemetry.level.push(lvl);
                if (telemetry.level.length > 20) { telemetry.labels.shift(); telemetry.level.shift(); }
                chart.update('none');
            }

            battery.addEventListener('chargingchange', update);
            battery.addEventListener('levelchange', update);
            setInterval(update, 2000);
            update();
        }

        function showDetail(type) {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');
            modal.style.display = 'flex';

            const details = {
                power: `<h2 class="orbitron text-cyan-400 mb-4">Power Analysis</h2>
                        <p class="text-xs text-gray-400 mb-4">Input Voltage: 5.2V<br>Controller: USB-PD 3.0<br>Stability: 99.8%</p>
                        <div class="p-4 bg-white/5 rounded-xl border border-white/10 text-[10px]">Arus pengisian disesuaikan secara otomatis berdasarkan suhu inti perangkat.</div>`,
                temp: `<h2 class="orbitron text-orange-400 mb-4">Thermal Map</h2>
                       <p class="text-xs text-gray-400 mb-4">Core: ${document.getElementById('temp').innerText}°C<br>Limit: 45.0°C<br>Status: Optimal</p>
                       <div class="p-4 bg-orange-500/10 rounded-xl border border-orange-500/20 text-[10px] text-orange-200">Suhu terjaga. Menghindari degradasi kimia pada sel Lithium-Ion.</div>`,
                health: `<h2 class="orbitron text-green-400 mb-4">Battery Health</h2>
                         <p class="text-xs text-gray-400 mb-4">Design Cap: 5000mAh<br>Current Cap: 4910mAh<br>Score: 98%</p>
                         <div class="p-4 bg-green-500/10 rounded-xl border border-green-500/20 text-[10px] text-green-200">Kesehatan baterai sangat baik. Tidak ditemukan anomali pada siklus pengisian.</div>`,
                eta: `<h2 class="orbitron text-white mb-4">Time Estimation</h2>
                      <p class="text-xs text-gray-400 mb-4">Full Charge: ${document.getElementById('eta').innerText}<br>Pattern: Fast Charging<br>Method: Titan AI</p>`,
                curve: `<h2 class="orbitron text-cyan-400 mb-4">Full Analytics</h2>
                        <p class="text-xs text-gray-400">Klik area luar untuk menutup log sistem ini.</p>`
            };
            content.innerHTML = details[type] || "";
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function unlock() { document.body.classList.add('unlocked'); }

        window.onload = () => {
            initChart();
            startEngine();
            document.getElementById('os-tag').innerText = "CORE: " + (navigator.platform.includes('iP') ? "IOS-XP" : "DROID-X");
        };
    </script>
</body>
</html>
